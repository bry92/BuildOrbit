<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code Editor — BuildOrbit</title>
    <link rel="stylesheet" href="/css/buildorbit.css?v=20260426g">
    <!-- CodeMirror 5 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/idea.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/xml/xml.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/javascript/javascript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/css/css.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/htmlmixed/htmlmixed.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/display/autorefresh.min.js"></script>
    <style>
    /* ── Copilot layout override — full-height 3-panel ── */
    body.page-copilot {
        display: flex;
        flex-direction: column;
        height: 100vh;
        overflow: hidden;
    }

    body.page-copilot nav {
        flex-shrink: 0;
    }

    /* ── 3-panel layout ── */
    .copilot-layout {
        display: grid;
        grid-template-columns: 256px 1fr 360px;
        flex: 1;
        min-height: 0;
        overflow: hidden;
        background: var(--bg);
    }

    /* ── File Tree Panel ── */
    .file-tree-panel {
        border-right: 1px solid var(--border);
        background: var(--surface);
        display: flex;
        flex-direction: column;
        min-height: 0;
        overflow: hidden;
    }

    .file-tree-header {
        padding: 12px 16px;
        border-bottom: 1px solid var(--border);
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--text-muted);
        display: flex;
        align-items: center;
        justify-content: space-between;
        flex-shrink: 0;
    }

    .file-tree-loading {
        padding: 24px 16px;
        font-size: 13px;
        color: var(--text-dim);
        text-align: center;
    }

    .file-tree-scroll {
        flex: 1;
        overflow-y: auto;
        padding: 8px 0;
    }

    .file-tree-scroll::-webkit-scrollbar { width: 4px; }
    .file-tree-scroll::-webkit-scrollbar-track { background: transparent; }
    .file-tree-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* Tree nodes */
    .tree-folder {
        user-select: none;
    }

    .tree-folder-name {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 4px 16px;
        font-size: 13px;
        font-weight: 500;
        color: var(--text-muted);
        cursor: pointer;
        transition: background 0.1s;
    }

    .tree-folder-name:hover {
        background: var(--surface-2);
    }

    .tree-folder-arrow {
        font-size: 9px;
        opacity: 0.6;
        transition: transform 0.15s;
        flex-shrink: 0;
    }

    .tree-folder.open > .tree-folder-name .tree-folder-arrow {
        transform: rotate(90deg);
    }

    .tree-folder-icon {
        font-size: 13px;
        flex-shrink: 0;
    }

    .tree-folder-children {
        display: none;
        padding-left: 16px;
    }

    .tree-folder.open > .tree-folder-children {
        display: block;
    }

    .tree-file {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 4px 16px;
        font-size: 13px;
        font-family: 'DM Mono', monospace;
        color: var(--text);
        cursor: pointer;
        transition: background 0.1s;
        border-radius: 0;
        position: relative;
    }

    .tree-file:hover {
        background: var(--surface-2);
    }

    .tree-file.active {
        background: var(--accent-dim);
        color: var(--accent);
        font-weight: 500;
    }

    .tree-file.modified::after {
        content: '';
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--warning);
        position: absolute;
        right: 12px;
        top: 50%;
        transform: translateY(-50%);
    }

    .tree-file-icon {
        font-size: 12px;
        flex-shrink: 0;
        opacity: 0.7;
    }

    .file-count-badge {
        font-size: 11px;
        background: var(--accent-dim);
        color: var(--accent);
        padding: 1px 6px;
        border-radius: 10px;
        font-weight: 600;
    }

    /* ── Editor Panel ── */
    .editor-panel {
        display: flex;
        flex-direction: column;
        min-height: 0;
        overflow: hidden;
        background: var(--surface);
        border-right: 1px solid var(--border);
    }

    .editor-toolbar {
        padding: 10px 16px;
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        gap: 12px;
        flex-shrink: 0;
        background: var(--surface);
        min-height: 44px;
    }

    .editor-breadcrumb {
        flex: 1;
        font-size: 13px;
        font-family: 'DM Mono', monospace;
        color: var(--text-muted);
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
    }

    .editor-breadcrumb .file-name {
        color: var(--text);
        font-weight: 500;
    }

    .editor-save-btn {
        padding: 5px 14px;
        border: 1px solid var(--border);
        background: var(--surface);
        color: var(--text-muted);
        border-radius: var(--radius-sm);
        font-size: 12px;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.15s;
        display: flex;
        align-items: center;
        gap: 5px;
        flex-shrink: 0;
    }

    .editor-save-btn:hover:not(:disabled) {
        border-color: var(--accent);
        color: var(--accent);
    }

    .editor-save-btn.has-changes {
        background: var(--accent);
        color: white;
        border-color: var(--accent);
    }

    .editor-save-btn.has-changes:hover {
        background: var(--accent-hover);
        border-color: var(--accent-hover);
    }

    .editor-save-btn:disabled {
        opacity: 0.5;
        cursor: default;
    }

    .editor-lang-badge {
        padding: 2px 8px;
        background: var(--surface-2);
        border: 1px solid var(--border);
        border-radius: 10px;
        font-size: 11px;
        font-family: 'DM Mono', monospace;
        color: var(--text-muted);
        flex-shrink: 0;
    }

    .editor-modified-pill {
        padding: 2px 8px;
        background: var(--warning-dim);
        border: 1px solid rgba(245,158,11,0.2);
        border-radius: 10px;
        font-size: 11px;
        color: var(--warning);
        font-weight: 500;
        display: none;
        flex-shrink: 0;
    }

    .editor-modified-pill.show {
        display: inline-block;
    }

    .editor-body {
        flex: 1;
        overflow: hidden;
        position: relative;
    }

    .editor-empty {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100%;
        color: var(--text-dim);
        gap: 8px;
    }

    .editor-empty-icon {
        font-size: 32px;
        opacity: 0.4;
    }

    .editor-empty-text {
        font-size: 14px;
    }

    /* CodeMirror overrides */
    .CodeMirror {
        height: 100%;
        font-family: 'DM Mono', monospace;
        font-size: 13px;
        line-height: 1.6;
        border: none;
        background: var(--surface);
        color: var(--text);
    }

    .CodeMirror-scroll {
        padding-bottom: 40px;
    }

    .CodeMirror-gutters {
        background: var(--surface-2);
        border-right: 1px solid var(--border);
    }

    .CodeMirror-linenumber {
        color: var(--text-dim);
        font-size: 11px;
        min-width: 36px;
        padding-right: 8px;
    }

    .CodeMirror-cursor {
        border-left-color: var(--accent);
    }

    .CodeMirror-selected {
        background: var(--accent-dim) !important;
    }

    /* Added line (diff) */
    .cm-line-added {
        background: rgba(16, 185, 129, 0.08);
    }

    /* Removed line (diff) */
    .cm-line-removed {
        background: rgba(239, 68, 68, 0.08);
        text-decoration: line-through;
        opacity: 0.6;
    }

    /* ── Chat Panel ── */
    .chat-panel {
        display: flex;
        flex-direction: column;
        min-height: 0;
        overflow: hidden;
        background: var(--surface);
    }

    .chat-header {
        padding: 12px 16px;
        border-bottom: 1px solid var(--border);
        flex-shrink: 0;
    }

    .chat-header-title {
        font-size: 13px;
        font-weight: 600;
        color: var(--text);
        display: flex;
        align-items: center;
        gap: 8px;
    }

    .chat-header-title .chat-icon {
        width: 20px;
        height: 20px;
        background: var(--accent-dim);
        border: 1px solid var(--accent-border);
        border-radius: 4px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 11px;
    }

    .chat-context-pill {
        margin-top: 6px;
        font-size: 11px;
        color: var(--text-dim);
        display: flex;
        align-items: center;
        gap: 4px;
    }

    .chat-context-file {
        font-family: 'DM Mono', monospace;
        color: var(--text-muted);
        font-size: 11px;
    }

    .chat-messages {
        flex: 1;
        overflow-y: auto;
        padding: 16px;
        display: flex;
        flex-direction: column;
        gap: 12px;
    }

    .chat-messages::-webkit-scrollbar { width: 4px; }
    .chat-messages::-webkit-scrollbar-track { background: transparent; }
    .chat-messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .chat-welcome {
        text-align: center;
        padding: 24px 16px;
        color: var(--text-dim);
    }

    .chat-welcome-icon {
        font-size: 28px;
        margin-bottom: 8px;
    }

    .chat-welcome-text {
        font-size: 13px;
        line-height: 1.5;
        color: var(--text-muted);
    }

    .chat-chips {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin-top: 12px;
        justify-content: center;
    }

    .chat-chips button {
        padding: 5px 10px;
        border: 1px solid var(--border);
        background: var(--surface);
        border-radius: 20px;
        font-size: 12px;
        color: var(--text-muted);
        cursor: pointer;
        transition: all 0.15s;
    }

    .chat-chips button:hover {
        border-color: var(--accent);
        color: var(--accent);
        background: var(--accent-dim);
    }

    .chat-msg {
        display: flex;
        flex-direction: column;
        gap: 4px;
        max-width: 100%;
    }

    .chat-msg-user {
        align-items: flex-end;
    }

    .chat-msg-assistant {
        align-items: flex-start;
    }

    .chat-msg-system {
        align-items: center;
    }

    .chat-msg-bubble {
        padding: 8px 12px;
        border-radius: var(--radius-md);
        font-size: 13px;
        line-height: 1.55;
        max-width: 90%;
        word-break: break-word;
    }

    .chat-msg-user .chat-msg-bubble {
        background: var(--accent);
        color: white;
        border-bottom-right-radius: 4px;
    }

    .chat-msg-assistant .chat-msg-bubble {
        background: var(--surface-2);
        border: 1px solid var(--border);
        color: var(--text);
        border-bottom-left-radius: 4px;
        white-space: pre-wrap;
    }

    .chat-msg-system .chat-msg-bubble {
        background: var(--surface-2);
        color: var(--text-dim);
        font-size: 12px;
        border: 1px solid var(--border);
    }

    .chat-msg-bubble.loading {
        color: var(--text-dim);
    }

    .chat-msg-bubble.loading::after {
        content: ' ●';
        animation: blink 1s infinite;
    }

    @keyframes blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.3; }
    }

    /* Code block inside chat */
    .chat-code-block {
        background: var(--surface-2);
        border: 1px solid var(--border);
        border-radius: var(--radius-sm);
        overflow: hidden;
        margin: 6px 0;
        max-width: 100%;
    }

    .chat-code-header {
        padding: 6px 10px;
        background: var(--surface);
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: space-between;
        font-size: 11px;
        color: var(--text-dim);
    }

    .chat-code-apply-btn {
        padding: 3px 8px;
        background: var(--accent);
        color: white;
        border: none;
        border-radius: 4px;
        font-size: 11px;
        cursor: pointer;
        font-weight: 500;
        transition: background 0.15s;
    }

    .chat-code-apply-btn:hover {
        background: var(--accent-hover);
    }

    .chat-code-content {
        padding: 10px;
        font-family: 'DM Mono', monospace;
        font-size: 12px;
        overflow-x: auto;
        line-height: 1.5;
        color: var(--text);
        white-space: pre;
    }

    .chat-input-area {
        border-top: 1px solid var(--border);
        padding: 12px 16px;
        display: flex;
        gap: 8px;
        flex-shrink: 0;
        background: var(--surface);
    }

    .chat-input {
        flex: 1;
        padding: 8px 12px;
        border: 1px solid var(--border);
        border-radius: var(--radius-md);
        font-family: 'Inter', sans-serif;
        font-size: 13px;
        color: var(--text);
        background: var(--surface);
        outline: none;
        resize: none;
        min-height: 36px;
        max-height: 120px;
        overflow-y: auto;
        line-height: 1.5;
        transition: border-color 0.15s;
    }

    .chat-input:focus {
        border-color: var(--accent);
    }

    .chat-input::placeholder {
        color: var(--text-dim);
    }

    .chat-send-btn {
        padding: 8px 14px;
        background: var(--accent);
        color: white;
        border: none;
        border-radius: var(--radius-md);
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
        transition: background 0.15s;
        flex-shrink: 0;
        align-self: flex-end;
    }

    .chat-send-btn:hover:not(:disabled) {
        background: var(--accent-hover);
    }

    .chat-send-btn:disabled {
        opacity: 0.5;
        cursor: default;
    }

    /* ── Save status toast ── */
    .save-toast {
        position: fixed;
        bottom: 24px;
        left: 50%;
        transform: translateX(-50%) translateY(20px);
        padding: 8px 16px;
        background: var(--text);
        color: white;
        border-radius: var(--radius-md);
        font-size: 13px;
        font-weight: 500;
        opacity: 0;
        transition: all 0.2s;
        pointer-events: none;
        z-index: 1000;
    }

    .save-toast.show {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
    }

    .save-toast.success {
        background: var(--success);
    }

    .save-toast.error {
        background: var(--error);
    }

    /* ── Error state ── */
    .copilot-error {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100%;
        gap: 12px;
        color: var(--text-dim);
        padding: 24px;
        text-align: center;
    }

    .copilot-error-icon {
        font-size: 36px;
    }

    .copilot-error-title {
        font-size: 16px;
        font-weight: 600;
        color: var(--text-muted);
    }

    .copilot-error-msg {
        font-size: 13px;
        color: var(--text-dim);
        max-width: 300px;
        line-height: 1.5;
    }

    /* ── Mobile tab bar (visible ≤ 768px) ── */
    .mobile-tab-bar {
        display: none;
        border-bottom: 1px solid var(--border);
        background: var(--surface);
        flex-shrink: 0;
    }
    .mobile-tab-bar-inner {
        display: flex;
        gap: 0;
    }
    .mobile-tab {
        flex: 1;
        padding: 10px 8px;
        text-align: center;
        font-size: 13px;
        font-weight: 500;
        color: var(--text-dim);
        cursor: pointer;
        border-bottom: 2px solid transparent;
        transition: color 0.15s, border-color 0.15s;
        background: none;
        border-top: none;
        border-left: none;
        border-right: none;
        min-height: auto;
        border-radius: 0;
    }
    .mobile-tab:hover {
        color: var(--text-muted);
    }
    .mobile-tab.active {
        color: var(--accent);
        border-bottom-color: var(--accent);
        font-weight: 600;
    }

    /* ── Responsive: collapse file tree on medium screens ── */
    @media (max-width: 900px) {
        .copilot-layout {
            grid-template-columns: 48px 1fr 0;
        }

        .file-tree-panel .file-tree-scroll {
            display: none;
        }

        .file-tree-panel .file-tree-header span:first-child {
            display: none;
        }

        .chat-panel {
            display: none;
        }
    }

    /* ── Mobile: tabbed single-panel layout ── */
    @media (max-width: 768px) {
        .mobile-tab-bar {
            display: block;
        }
        .copilot-layout {
            display: flex;
            flex-direction: column;
        }
        .file-tree-panel,
        .editor-panel,
        .chat-panel {
            display: none;
            flex: 1;
            min-height: 0;
            overflow: auto;
        }
        .file-tree-panel.mobile-active,
        .editor-panel.mobile-active,
        .chat-panel.mobile-active {
            display: flex;
            flex-direction: column;
        }
        .chat-panel.mobile-active {
            display: flex;
        }
        /* Full-width chat input on mobile */
        .chat-input-area {
            padding: 8px 12px;
        }
        .chat-input {
            font-size: 15px;
        }
        /* Adjust editor toolbar */
        .editor-toolbar {
            padding: 8px 12px;
        }
    }
    </style>
</head>
<body class="page-copilot">

    <nav>
        <a href="/" class="logo">
            <div class="logo-dot"></div>
            BuildOrbit
        </a>
        <div class="nav-links">
            <span class="nav-link" id="nav-run-back" style="cursor:pointer; color:var(--text-dim); font-size:13px;" onclick="goBackToRun()">← Back to run</span>
            <a href="/trace" class="nav-link" onmouseover="this.style.color='var(--accent)'" onmouseout="this.style.color='var(--text-dim)'">History</a>
            <a href="/dashboard" class="nav-link" onmouseover="this.style.color='var(--text)'" onmouseout="this.style.color='var(--text-dim)'">Dashboard</a>
            <a href="/auth/logout" class="nav-link" onmouseover="this.style.color='var(--text)'" onmouseout="this.style.color='var(--text-dim)'">Sign out</a>
        </div>
    </nav>

    <!-- Mobile tab bar — shown on small screens -->
    <div class="mobile-tab-bar" id="mobile-tab-bar">
        <div class="mobile-tab-bar-inner">
            <button class="mobile-tab" data-panel="chat" onclick="switchMobileTab('chat')">✦ AI Chat</button>
            <button class="mobile-tab" data-panel="editor" onclick="switchMobileTab('editor')">📝 Code</button>
            <button class="mobile-tab" data-panel="files" onclick="switchMobileTab('files')">📁 Files</button>
        </div>
    </div>

    <div class="copilot-layout" id="copilot-layout">

        <!-- File Tree Panel -->
        <div class="file-tree-panel" id="file-tree-panel">
            <div class="file-tree-header">
                <span>Files</span>
                <span class="file-count-badge" id="file-count">0</span>
            </div>
            <div class="file-tree-scroll" id="file-tree-scroll">
                <div class="file-tree-loading" id="file-tree-loading">Loading…</div>
            </div>
        </div>

        <!-- Editor Panel -->
        <div class="editor-panel" id="editor-panel">
            <div class="editor-toolbar">
                <div class="editor-breadcrumb" id="editor-breadcrumb">
                    <span style="color:var(--text-dim)">Select a file to edit</span>
                </div>
                <span class="editor-lang-badge" id="editor-lang-badge" style="display:none">—</span>
                <span class="editor-modified-pill" id="editor-modified-pill">unsaved</span>
                <button class="editor-save-btn" id="editor-save-btn" onclick="saveFile()" disabled>
                    <span>Save</span>
                </button>
            </div>
            <div class="editor-body" id="editor-body">
                <div class="editor-empty" id="editor-empty">
                    <div class="editor-empty-icon">📁</div>
                    <div class="editor-empty-text">Select a file from the tree to start editing</div>
                </div>
                <textarea id="editor-textarea" style="display:none"></textarea>
            </div>
        </div>

        <!-- Chat Panel -->
        <div class="chat-panel" id="chat-panel">
            <div class="chat-header">
                <div class="chat-header-title">
                    <div class="chat-icon">✦</div>
                    Code Copilot
                </div>
                <div class="chat-context-pill">
                    <span>Context:</span>
                    <span class="chat-context-file" id="chat-context-file">no file selected</span>
                </div>
            </div>
            <div class="chat-messages" id="chat-messages">
                <div class="chat-welcome" id="chat-welcome">
                    <div class="chat-welcome-icon">✦</div>
                    <div class="chat-welcome-text">Ask me to modify code, explain what something does, or suggest improvements.</div>
                    <div class="chat-chips" id="chat-chips">
                        <button onclick="chatAsk('Add form validation to this file')">Add form validation</button>
                        <button onclick="chatAsk('Make this responsive for mobile')">Make mobile-friendly</button>
                        <button onclick="chatAsk('Add dark mode support')">Add dark mode</button>
                        <button onclick="chatAsk('Explain what this code does')">Explain this code</button>
                        <button onclick="chatAsk('Fix any bugs you see')">Fix bugs</button>
                        <button onclick="chatAsk('Add error handling')">Add error handling</button>
                    </div>
                </div>
            </div>
            <div class="chat-input-area">
                <textarea
                    class="chat-input"
                    id="chat-input"
                    placeholder='e.g. "Add email validation to the login form"'
                    rows="1"
                    onkeydown="handleChatKey(event)"
                    oninput="autoResizeChatInput(this)"
                ></textarea>
                <button class="chat-send-btn" id="chat-send-btn" onclick="chatSend()">→</button>
            </div>
        </div>

    </div>

    <!-- Save Toast -->
    <div class="save-toast" id="save-toast"></div>

    <script>
    (function() {
        // ── State ──────────────────────────────────────────────────
        var runId = null;
        var allFiles = {};           // { "path/file.ext": "content" }
        var activeFile = null;       // currently selected file path
        var originalContents = {};   // original content per file (for diff tracking)
        var modifiedFiles = new Set();
        var cmEditor = null;
        var isEditorReady = false;
        var chatMsgCount = 0;
        var isChatSending = false;

        // ── Init ───────────────────────────────────────────────────
        function init() {
            // Extract runId from URL path: /run/:runId/edit
            var parts = window.location.pathname.split('/');
            // parts: ['', 'run', runId, 'edit']
            if (parts.length >= 3 && parts[1] === 'run') {
                runId = parts[2];
            }

            if (!runId || !/^[0-9a-f-]{36}$/i.test(runId)) {
                showLayoutError('Invalid run ID', 'The URL does not contain a valid build run ID. Please go back and click "Edit Code" again.');
                return;
            }

            loadCodeFiles();
            try {
                initEditor();
            } catch (editorErr) {
                console.error('[Copilot] Editor init failed:', editorErr);
                // Still usable — code view falls back to textarea
                var emptyEl = document.getElementById('editor-empty');
                if (emptyEl) emptyEl.innerHTML = '<div class="editor-empty-icon">⚠️</div><div class="editor-empty-text">Code editor loading — you can still use AI Chat to describe changes.</div>';
            }
        }

        // ── Load Code Files ────────────────────────────────────────
        async function loadCodeFiles() {
            try {
                // Try to get code files from the code artifact
                var res = await fetch('/api/pipeline/' + runId + '/code-files');
                if (!res.ok) {
                    throw new Error('HTTP ' + res.status);
                }
                var data = await res.json();
                if (!data.success) {
                    throw new Error(data.message || 'Failed to load files');
                }

                allFiles = data.files || {};
                var count = Object.keys(allFiles).length;

                if (count === 0) {
                    document.getElementById('file-tree-loading').textContent = 'No code files found for this build.';
                    return;
                }

                // Store originals
                for (var p in allFiles) {
                    originalContents[p] = allFiles[p];
                }

                document.getElementById('file-count').textContent = count;
                buildFileTree(allFiles);

                document.getElementById('file-tree-loading').style.display = 'none';

                // Auto-select first meaningful file
                var preferred = ['index.html', 'index.js', 'app.js', 'main.js', 'style.css'];
                var keys = Object.keys(allFiles);
                var first = preferred.find(function(p) { return keys.includes(p); }) || keys[0];
                if (first) selectFile(first);

            } catch (e) {
                document.getElementById('file-tree-loading').textContent = 'Failed to load files: ' + e.message;
                console.error('[Copilot] loadCodeFiles error:', e);
            }
        }

        // ── File Tree Builder ──────────────────────────────────────
        function buildFileTree(files) {
            var tree = {};
            Object.keys(files).forEach(function(filePath) {
                var parts = filePath.split('/');
                var node = tree;
                for (var i = 0; i < parts.length - 1; i++) {
                    if (!node[parts[i]]) node[parts[i]] = { _isDir: true, _children: {} };
                    node = node[parts[i]]._children;
                }
                node[parts[parts.length - 1]] = { _isDir: false, _path: filePath };
            });

            var container = document.getElementById('file-tree-scroll');
            container.innerHTML = '';
            renderTreeNode(tree, '', container);
        }

        function fileIcon(name) {
            var ext = name.split('.').pop().toLowerCase();
            var icons = {
                html: '🌐', css: '🎨', js: '⚡', json: '📋',
                md: '📝', txt: '📄', png: '🖼', jpg: '🖼', jpeg: '🖼',
                svg: '🎭', gif: '🖼', ico: '🔰', ts: '⚡', jsx: '⚡', tsx: '⚡'
            };
            return icons[ext] || '📄';
        }

        function renderTreeNode(node, basePath, container) {
            // Sort: directories first, then files
            var keys = Object.keys(node).sort(function(a, b) {
                var aIsDir = node[a]._isDir;
                var bIsDir = node[b]._isDir;
                if (aIsDir && !bIsDir) return -1;
                if (!aIsDir && bIsDir) return 1;
                return a.localeCompare(b);
            });

            keys.forEach(function(key) {
                var item = node[key];
                if (item._isDir) {
                    var folderEl = document.createElement('div');
                    folderEl.className = 'tree-folder open';
                    folderEl.dataset.path = (basePath ? basePath + '/' : '') + key;

                    var nameEl = document.createElement('div');
                    nameEl.className = 'tree-folder-name';
                    nameEl.innerHTML = '<span class="tree-folder-arrow">▶</span><span class="tree-folder-icon">📂</span>' + escHtml(key);
                    nameEl.onclick = function() {
                        folderEl.classList.toggle('open');
                    };

                    var childrenEl = document.createElement('div');
                    childrenEl.className = 'tree-folder-children';

                    renderTreeNode(item._children, (basePath ? basePath + '/' : '') + key, childrenEl);

                    folderEl.appendChild(nameEl);
                    folderEl.appendChild(childrenEl);
                    container.appendChild(folderEl);
                } else {
                    var fileEl = document.createElement('div');
                    fileEl.className = 'tree-file';
                    fileEl.dataset.path = item._path;
                    fileEl.id = 'tree-file-' + item._path.replace(/[^a-zA-Z0-9]/g, '_');
                    fileEl.innerHTML = '<span class="tree-file-icon">' + fileIcon(key) + '</span>' + escHtml(key);
                    fileEl.onclick = function() { selectFile(item._path); };
                    container.appendChild(fileEl);
                }
            });
        }

        // ── Editor Init ────────────────────────────────────────────
        function initEditor() {
            var ta = document.getElementById('editor-textarea');
            ta.style.display = '';

            cmEditor = CodeMirror.fromTextArea(ta, {
                lineNumbers: true,
                theme: 'idea',
                autoRefresh: true,
                lineWrapping: false,
                tabSize: 2,
                indentWithTabs: false,
                autofocus: false,
                readOnly: false,
            });

            cmEditor.setSize('100%', '100%');
            cmEditor.on('change', onEditorChange);
            isEditorReady = true;

            // Hide CodeMirror until a file is selected
            var cmEl = cmEditor.getWrapperElement();
            cmEl.style.display = 'none';
        }

        function onEditorChange() {
            if (!activeFile) return;
            var current = cmEditor.getValue();
            var modified = current !== originalContents[activeFile];

            if (modified) {
                modifiedFiles.add(activeFile);
            } else {
                modifiedFiles.delete(activeFile);
            }

            updateModifiedState();
        }

        function updateModifiedState() {
            var pill = document.getElementById('editor-modified-pill');
            var saveBtn = document.getElementById('editor-save-btn');

            if (activeFile && modifiedFiles.has(activeFile)) {
                pill.classList.add('show');
                saveBtn.classList.add('has-changes');
                saveBtn.disabled = false;
            } else {
                pill.classList.remove('show');
                saveBtn.classList.remove('has-changes');
                saveBtn.disabled = !activeFile;
            }

            // Update file tree dot
            if (activeFile) {
                var el = document.getElementById('tree-file-' + activeFile.replace(/[^a-zA-Z0-9]/g, '_'));
                if (el) {
                    el.classList.toggle('modified', modifiedFiles.has(activeFile));
                }
            }
        }

        // ── Select File ────────────────────────────────────────────
        function selectFile(filePath) {
            if (!isEditorReady) return;

            // On mobile, switch to code tab when a file is selected
            if (mobileMediaQuery.matches) {
                switchMobileTab('editor');
            }

            // Update active state in tree
            document.querySelectorAll('.tree-file').forEach(function(el) {
                el.classList.remove('active');
            });
            var el = document.getElementById('tree-file-' + filePath.replace(/[^a-zA-Z0-9]/g, '_'));
            if (el) el.classList.add('active');

            activeFile = filePath;

            // Update toolbar breadcrumb
            var parts = filePath.split('/');
            var fileName = parts.pop();
            var dirPath = parts.join('/');
            var bc = document.getElementById('editor-breadcrumb');
            bc.innerHTML = (dirPath ? escHtml(dirPath) + ' / ' : '') + '<span class="file-name">' + escHtml(fileName) + '</span>';

            // Update language badge
            var langBadge = document.getElementById('editor-lang-badge');
            var ext = fileName.split('.').pop().toLowerCase();
            var langMap = { html: 'html', css: 'css', js: 'js', json: 'json', ts: 'ts', jsx: 'jsx', tsx: 'tsx', md: 'md', txt: 'txt' };
            langBadge.textContent = langMap[ext] || ext;
            langBadge.style.display = '';

            // Load content into editor
            var content = allFiles[filePath] || '';
            var mode = getMode(ext);

            cmEditor.setOption('mode', mode);
            cmEditor.setValue(content);
            cmEditor.clearHistory();

            // Show editor, hide empty state
            document.getElementById('editor-empty').style.display = 'none';
            cmEditor.getWrapperElement().style.display = '';
            cmEditor.refresh();

            // Update save button
            document.getElementById('editor-save-btn').disabled = false;
            updateModifiedState();

            // Update chat context
            document.getElementById('chat-context-file').textContent = fileName;
        }

        function getMode(ext) {
            switch(ext) {
                case 'html': case 'htm': return 'htmlmixed';
                case 'css': return 'css';
                case 'js': case 'jsx': case 'ts': case 'tsx': return 'javascript';
                case 'json': return { name: 'javascript', json: true };
                case 'xml': case 'svg': return 'xml';
                default: return null;
            }
        }

        // ── Save File ──────────────────────────────────────────────
        async function saveFile() {
            if (!activeFile || !runId) return;

            var btn = document.getElementById('editor-save-btn');
            btn.disabled = true;
            btn.innerHTML = '<span>Saving…</span>';

            var content = cmEditor.getValue();

            try {
                var res = await fetch('/api/pipeline/' + runId + '/code-files/save', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ path: activeFile, content: content })
                });
                var data = await res.json();

                if (data.success) {
                    // Mark as saved
                    allFiles[activeFile] = content;
                    originalContents[activeFile] = content;
                    modifiedFiles.delete(activeFile);
                    updateModifiedState();
                    showToast('Saved ' + activeFile.split('/').pop(), 'success');
                } else {
                    showToast('Save failed: ' + (data.message || 'Unknown error'), 'error');
                }
            } catch (e) {
                showToast('Save failed — check connection', 'error');
            } finally {
                btn.innerHTML = '<span>Save</span>';
                btn.disabled = !activeFile;
                updateModifiedState();
            }
        }
        window.saveFile = saveFile;

        // ── Toast ──────────────────────────────────────────────────
        var toastTimer = null;
        function showToast(msg, type) {
            var t = document.getElementById('save-toast');
            t.textContent = msg;
            t.className = 'save-toast ' + (type || '') + ' show';
            if (toastTimer) clearTimeout(toastTimer);
            toastTimer = setTimeout(function() {
                t.classList.remove('show');
            }, 2500);
        }

        // ── Chat ───────────────────────────────────────────────────
        function autoResizeChatInput(el) {
            el.style.height = 'auto';
            el.style.height = Math.min(el.scrollHeight, 120) + 'px';
        }

        function handleChatKey(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                chatSend();
            }
        }
        window.handleChatKey = handleChatKey;
        window.autoResizeChatInput = autoResizeChatInput;

        function chatAsk(question) {
            var input = document.getElementById('chat-input');
            input.value = question;
            chatSend();
        }
        window.chatAsk = chatAsk;

        function appendMsg(role, text, isLoading) {
            var id = 'cmsg' + (++chatMsgCount);
            var wrapper = document.createElement('div');
            wrapper.className = 'chat-msg chat-msg-' + role;

            var bubble = document.createElement('div');
            bubble.className = 'chat-msg-bubble' + (isLoading ? ' loading' : '');
            bubble.id = id;
            bubble.textContent = text;

            wrapper.appendChild(bubble);

            var msgs = document.getElementById('chat-messages');

            // Hide welcome on first message
            var welcome = document.getElementById('chat-welcome');
            if (welcome) welcome.style.display = 'none';

            msgs.appendChild(wrapper);
            msgs.scrollTop = msgs.scrollHeight;
            return id;
        }

        function updateMsg(id, text) {
            var el = document.getElementById(id);
            if (!el) return;
            el.classList.remove('loading');
            el.textContent = '';
            renderAssistantContent(el, text);
            document.getElementById('chat-messages').scrollTop = 99999;
        }

        function renderAssistantContent(el, text) {
            // Detect code blocks and render with Apply button
            var parts = text.split(/(```[\s\S]*?```)/g);
            parts.forEach(function(part) {
                if (part.startsWith('```')) {
                    var lines = part.split('\n');
                    var lang = lines[0].replace('```', '').trim() || 'code';
                    var codeContent = lines.slice(1, lines.length - 1).join('\n');

                    var block = document.createElement('div');
                    block.className = 'chat-code-block';

                    var header = document.createElement('div');
                    header.className = 'chat-code-header';
                    header.innerHTML = '<span>' + escHtml(lang) + '</span>';

                    var applyBtn = document.createElement('button');
                    applyBtn.className = 'chat-code-apply-btn';
                    applyBtn.textContent = 'Apply';
                    (function(code) {
                        applyBtn.onclick = function() { applyCodeSuggestion(code); };
                    })(codeContent);

                    header.appendChild(applyBtn);

                    var pre = document.createElement('div');
                    pre.className = 'chat-code-content';
                    pre.textContent = codeContent;

                    block.appendChild(header);
                    block.appendChild(pre);
                    el.appendChild(block);
                } else if (part.trim()) {
                    var span = document.createElement('span');
                    span.textContent = part;
                    el.appendChild(span);
                }
            });
        }

        function applyCodeSuggestion(code) {
            if (!cmEditor || !activeFile) {
                showToast('Select a file first', 'error');
                return;
            }
            // Apply: replace entire editor content or selected range
            var selection = cmEditor.getSelection();
            if (selection) {
                cmEditor.replaceSelection(code);
            } else {
                cmEditor.setValue(code);
            }
            showToast('Code applied to ' + activeFile.split('/').pop(), 'success');
        }
        window.applyCodeSuggestion = applyCodeSuggestion;

        async function chatSend() {
            if (isChatSending) return;
            var input = document.getElementById('chat-input');
            var question = input.value.trim();
            if (!question) return;

            isChatSending = true;
            var sendBtn = document.getElementById('chat-send-btn');
            sendBtn.disabled = true;
            input.value = '';
            input.style.height = 'auto';

            appendMsg('user', question);

            var loadingId = appendMsg('assistant', 'Thinking', true);

            try {
                var payload = {
                    question: question,
                    file: activeFile || null,
                    fileContent: (activeFile && cmEditor) ? cmEditor.getValue() : null
                };

                var res = await fetch('/api/pipeline/' + runId + '/copilot/edit', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                var data = await res.json();
                updateMsg(loadingId, data.success ? data.answer : ('Error: ' + (data.message || 'Unknown error')));
            } catch (e) {
                updateMsg(loadingId, 'Failed to reach the copilot. Check your connection and try again.');
            } finally {
                isChatSending = false;
                sendBtn.disabled = false;
                input.focus();
            }
        }
        window.chatSend = chatSend;

        // ── Error state ────────────────────────────────────────────
        function showLayoutError(title, msg) {
            var layout = document.getElementById('copilot-layout');
            layout.innerHTML = '<div class="copilot-error"><div class="copilot-error-icon">⚠️</div><div class="copilot-error-title">' + escHtml(title) + '</div><div class="copilot-error-msg">' + escHtml(msg) + '</div><a href="/dashboard" style="margin-top:8px;color:var(--accent);font-size:13px;">← Dashboard</a></div>';
        }

        // ── Go back to run ─────────────────────────────────────────
        function goBackToRun() {
            if (runId) {
                window.location.href = '/run?id=' + runId;
            } else {
                window.history.back();
            }
        }
        window.goBackToRun = goBackToRun;

        // ── Utilities ──────────────────────────────────────────────
        function escHtml(str) {
            return String(str)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;');
        }

        // ── Keyboard shortcuts ─────────────────────────────────────
        document.addEventListener('keydown', function(e) {
            if ((e.ctrlKey || e.metaKey) && e.key === 's') {
                e.preventDefault();
                if (activeFile) saveFile();
            }
        });

        // ── Mobile Tab Switching ─────────────────────────────────────
        var mobileMediaQuery = window.matchMedia('(max-width: 768px)');
        var currentMobileTab = 'chat'; // Default to AI Chat on mobile

        function switchMobileTab(tab) {
            currentMobileTab = tab;
            var panels = {
                'files': document.getElementById('file-tree-panel'),
                'editor': document.getElementById('editor-panel'),
                'chat': document.getElementById('chat-panel')
            };
            var tabs = document.querySelectorAll('.mobile-tab');

            // Remove active from all
            tabs.forEach(function(t) { t.classList.remove('active'); });
            Object.values(panels).forEach(function(p) { if (p) p.classList.remove('mobile-active'); });

            // Activate selected
            var selectedTab = document.querySelector('.mobile-tab[data-panel="' + tab + '"]');
            if (selectedTab) selectedTab.classList.add('active');
            if (panels[tab]) panels[tab].classList.add('mobile-active');

            // Refresh editor if switching to code tab
            if (tab === 'editor' && cmEditor) {
                setTimeout(function() { cmEditor.refresh(); }, 50);
            }
        }
        window.switchMobileTab = switchMobileTab;

        function applyMobileLayout() {
            if (mobileMediaQuery.matches) {
                switchMobileTab(currentMobileTab);
            } else {
                // Desktop: remove mobile-active classes
                var panels = document.querySelectorAll('.file-tree-panel, .editor-panel, .chat-panel');
                panels.forEach(function(p) { p.classList.remove('mobile-active'); });
                if (cmEditor) setTimeout(function() { cmEditor.refresh(); }, 50);
            }
        }

        mobileMediaQuery.addEventListener('change', applyMobileLayout);

        // ── Boot ───────────────────────────────────────────────────
        init();
        applyMobileLayout();

    })();
    </script>

    <script src="/sidebar.js"></script>
</body>
